<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IP Info</title>
    <meta name="author" content="Abdulkerim Sesli" />
    <meta
      name="keywords"
      content="utility, ip, network, geo, location, cloudflare, info, Abdulkerim, Sesli"
    />
    <meta
      name="description"
      content="Zeigt deine öffentliche IP-Adresse und Standortinformationen an. Optimiert für Cloudflare Workers/Pages."
    />
    <link rel="stylesheet" href="style.css" />
    <!-- Optimized: No External Frameworks -->
    <link rel="stylesheet" href="../../card-integration.css" />
    <script src="../../card-fit.js" defer></script>
  </head>
  <body>
    <div class="app-container">
      <header class="header">
        <h1>🌐 IP Info</h1>
        <button class="btn" onclick="fetchIPInfo()" title="Aktualisieren">
          🔄
        </button>
      </header>

      <div class="ip-card">
        <div class="ip-header">
          <h2>Deine IP-Adresse</h2>
          <div class="ip-display" id="ip-address">Lädt...</div>
        </div>

        <div class="info-grid">
          <div class="info-item">
            <span class="label">Land</span>
            <span class="value" id="country">-</span>
          </div>
          <div class="info-item">
            <span class="label">Region</span>
            <span class="value" id="region">-</span>
          </div>
          <div class="info-item">
            <span class="label">Stadt</span>
            <span class="value" id="city">-</span>
          </div>
          <div class="info-item">
            <span class="label">ISP</span>
            <span class="value" id="isp">-</span>
          </div>
          <div class="info-item">
            <span class="label">Zeitzone</span>
            <span class="value" id="timezone">-</span>
          </div>
          <div class="info-item">
            <span class="label">Koordinaten</span>
            <span class="value" id="coords">-</span>
          </div>
        </div>
      </div>

      <div id="status-message" class="status"></div>
    </div>

    <script>
      async function fetchIPInfo() {
        const ipDisplay = document.getElementById("ip-address");
        const countryDisplay = document.getElementById("country");
        const regionDisplay = document.getElementById("region");
        const cityDisplay = document.getElementById("city");
        const ispDisplay = document.getElementById("isp");
        const timezoneDisplay = document.getElementById("timezone");
        const coordsDisplay = document.getElementById("coords");
        const statusMessage = document.getElementById("status-message");

        ipDisplay.textContent = "Lädt...";
        statusMessage.textContent = "";

        // Reset fields
        countryDisplay.textContent = "-";
        regionDisplay.textContent = "-";
        cityDisplay.textContent = "-";
        ispDisplay.textContent = "-";
        timezoneDisplay.textContent = "-";
        coordsDisplay.textContent = "-";

        try {
          // In a real environment, we would fetch from an API like ipapi.co
          // Since the sandbox has no internet, this fetch will likely fail.
          // We handle this gracefully.

          const response = await fetch('https://ipapi.co/json/');
          if (!response.ok) throw new Error('Network response was not ok');
          const data = await response.json();

          updateUI(data);

        } catch (error) {
          console.warn("Fehler beim Abrufen der IP-Informationen (möglicherweise Offline/Sandbox):", error);

          // Fallback / Mock data ONLY if fetch fails (e.g. in sandbox)
          const mockData = {
                 ip: "127.0.0.1 (Demo)",
                 country_name: "Deutschland",
                 region: "Berlin",
                 city: "Berlin",
                 org: "Sandbox Environment",
                 timezone: "Europe/Berlin",
                 latitude: 52.5200,
                 longitude: 13.4050
          };
          updateUI(mockData);
          statusMessage.textContent = "Hinweis: Demo-Modus (keine Verbindung zur API)";
        }
      }

      function updateUI(data) {
        document.getElementById("ip-address").textContent = data.ip || "Nicht verfügbar";
        document.getElementById("country").textContent = data.country_name || data.country || "-";
        document.getElementById("region").textContent = data.region || data.region_code || "-";
        document.getElementById("city").textContent = data.city || "-";
        document.getElementById("isp").textContent = data.org || data.asn || "-";
        document.getElementById("timezone").textContent = data.timezone || "-";

        if (data.latitude && data.longitude) {
            document.getElementById("coords").textContent = `${data.latitude}, ${data.longitude}`;
        } else {
            document.getElementById("coords").textContent = "-";
        }
      }

      // Initial load
      document.addEventListener('DOMContentLoaded', fetchIPInfo);
    </script>
  </body>
</html>
