<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schlüsselweite Rechner</title>
    <meta name="description" content="Berechne die Schlüsselweite (SW) für metrische Schrauben und Muttern nach ISO und DIN Normen.">
    <meta name="keywords" content="schluesselweite, wrench, size, schrauben, muttern, iso, din, calculator, tool, werkzeug">
    <meta name="author" content="Jules">
    <link rel="stylesheet" href="../../card-integration.css">
    <link rel="stylesheet" href="style.css">
    <script src="../../card-fit.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>
    <div id="card-fit-wrapper">
        <div class="app-container">
            <!-- No H1 -->

            <div class="standard-toggle">
                <div id="isoBtn" class="toggle-option active">ISO</div>
                <div id="dinBtn" class="toggle-option">DIN</div>
            </div>

            <!-- Dynamic Visual Area -->
            <div class="visual-area">
                <div class="hex-visual-container">
                    <svg id="hexSvg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
                        <!-- Background Shadow Circle -->
                        <circle cx="50" cy="50" r="45" fill="rgba(0,0,0,0.2)" filter="blur(5px)" />
                        <!-- Hexagon Path (Calculated dynamically via JS) -->
                        <path id="hexPath" class="hex-path" d="" fill="none" />
                        <!-- Inner Circle (Thread hole representation) -->
                        <circle id="innerHole" cx="50" cy="50" r="0" fill="rgba(15, 23, 42, 0.9)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
                        <!-- Text inside for M-Size -->
                        <text id="visualLabel" x="50" y="53" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="600" opacity="0.8">M6</text>
                    </svg>
                </div>
                <!-- Removed old result-display -->
            </div>

            <div class="input-section animate-entry">
                <div class="search-wrapper">
                    <input type="number" id="sizeInput" placeholder="Größe eingeben (z.B. 6)" inputmode="numeric">
                </div>

                <div id="quickGrid" class="quick-select-grid">
                    <!-- Populated by JS -->
                </div>

                <!-- Modern Data Table -->
                <div class="data-table-container">
                    <table class="tech-table">
                        <tbody>
                            <tr>
                                <td class="label-col">Gewinde</td>
                                <td id="tableMSize" class="value-col">-</td>
                            </tr>
                            <tr>
                                <td class="label-col">Schlüsselweite (SW)</td>
                                <td id="tableSW" class="value-col">-</td>
                            </tr>
                            <tr>
                                <td class="label-col">Steigung (P)</td>
                                <td id="tablePitch" class="value-col">-</td>
                            </tr>
                            <tr>
                                <td class="label-col">Kernloch (Bohrer)</td>
                                <td id="tableTapDrill" class="value-col">-</td>
                            </tr>
                            <tr>
                                <td class="label-col">Durchgangsloch (mittel)</td>
                                <td id="tableClearance" class="value-col">-</td>
                            </tr>
                            <tr id="tableAltRow" style="display:none;">
                                <td id="tableAltLabel" class="label-col" style="color:var(--accent-color)">Alternative</td>
                                <td id="tableAltValue" class="value-col" style="color:var(--accent-color)">-</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
